{% extends "base.html" %}

{% block title %}Deactivate Job · Recruiter Portal{% endblock %}

{% block content %}
  <div class="container">
    <div class="cpms-narrow cpms-fade-in">
      <div class="cpms-card">
        <div class="card-body text-center py-5">
          <i class="bi bi-exclamation-triangle text-warning" style="font-size: 3rem;"></i>
          <h4 class="mt-3 mb-2">Deactivate this job?</h4>
          <p class="text-secondary mb-4">"{{ job.title }}" will be hidden from students. You can reactivate it later by editing.</p>
          <form method="post" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-warning">Deactivate</button>
          </form>
          <a href="{% url 'recruiter:job_detail' job.pk %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
